databaseChangeLog:

  # ──────────────────────────────────────────────────────────────
  # Changeset 1: Create product table (expanded schema)
  # ──────────────────────────────────────────────────────────────
  - changeSet:
      id: product-table-v2
      author: sonichigo
      labels: products-api
      comment: Creating product table for REST API with expanded columns
      changes:
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: SERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: sku
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: category
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: NUMERIC(10,2)
                  defaultValue: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: stock_quantity
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: is_available
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
      rollback:
        - dropTable:
            tableName: product

  # ──────────────────────────────────────────────────────────────
  # Changeset 2: Add indexes
  # ──────────────────────────────────────────────────────────────
  - changeSet:
      id: product-table-indexes-v2
      author: sonichigo
      labels: products-api
      comment: Adding indexes for the products table
      changes:
        - createIndex:
            tableName: product
            columns:
              - column:
                  name: name
            indexName: idx_products_name
        - createIndex:
            tableName: product
            columns:
              - column:
                  name: category
            indexName: idx_products_category
        - createIndex:
            tableName: product
            columns:
              - column:
                  name: sku
            indexName: idx_products_sku
        - createIndex:
            tableName: product
            columns:
              - column:
                  name: is_available
            indexName: idx_products_is_available
      rollback:
        - dropIndex:
            indexName: idx_products_name
            tableName: product
        - dropIndex:
            indexName: idx_products_category
            tableName: product
        - dropIndex:
            indexName: idx_products_sku
            tableName: product
        - dropIndex:
            indexName: idx_products_is_available
            tableName: product

